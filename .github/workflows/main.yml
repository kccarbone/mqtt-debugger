name: CI

on: 
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org'
      - name: Pack library
        id: pack
        run: |
          rm -rf .github/
          rm .gitignore
          rm README.md
          PACKAGE_FILE="$(npm pack)"
          VERSION="$(node -p "require('./package.json').version")"
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        run: npm publish --provenance --access public
      - name: Create GitHub release and upload package
        run: |
          gh release create "${{ steps.pack.outputs.version }}" "${{ steps.pack.outputs.package_file }}" --title "v${{ steps.pack.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}